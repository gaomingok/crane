<!DOCTYPE html>
<html>
<head> 
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
<title>吊臂计算</title> 
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #e8f4f8 0%, #d1e8f0 100%);
        padding: 12px;
        height: 100vh;
    }
    .container {
        max-width: 400px;
        height: 100%;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 8px;
        font-size: 18px;
        flex-shrink: 0;
    }
    #myCanvas {
        width: 100%;
        height: 30% !important;
        min-height: 100px;
        max-height: 225px;
        display: block;
        margin: 0 auto 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
        background: #f8f8f8;
        flex-shrink: 0;
    }
    .button-container {
        text-align: center;
        margin-bottom: 8px;
        flex-shrink: 0;
    }
    button {
        background: linear-gradient(135deg, #2196F3, #1976D2);
        color: white;
        border: none;
        padding: 10px 32px;
        font-size: 15px;
        font-weight: bold;
        border-radius: 20px;
        cursor: pointer;
        box-shadow: 0 3px 8px rgba(33,150,243,0.35);
    }
    button:active { transform: scale(0.95); }
    .input-group {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        margin-bottom: 6px;
        flex-shrink: 0;
    }
    .input-item {
        display: flex;
        align-items: center;
        margin-bottom: 6px;
        width: 48%;
    }
    .input-item label {
        font-size: 14px;
        font-weight: bold;
        color: #555;
        min-width: 20px;
        margin-right: 4px;
    }
    .input-item input {
        flex: 1;
        padding: 8px 4px;
        border: 2px solid #2196F3;
        border-radius: 6px;
        font-size: 14px;
        text-align: center;
        min-width: 50px;
    }
    .input-item input:focus { border-color: #FF5722; outline: none; }
    .input-item span { font-size: 12px; color: #888; margin-left: 2px; }
    .output-group {
        display: flex;
        justify-content: space-around;
        margin-bottom: 8px;
        padding: 8px;
        background: #f0f7fc;
        border-radius: 8px;
        flex-shrink: 0;
    }
    .output-item { text-align: center; }
    .output-item label { display: block; font-size: 12px; color: #666; margin-bottom: 2px; }
    .output-item span { display: block; font-size: 16px; font-weight: bold; color: #2196F3; }
</style>
</head>
<body>
<div class="container">
    <h2>吊臂计算</h2>
    <canvas id="myCanvas" width="350" height="225"></canvas>
    
    <div class="button-container">
        <button type="button" onclick="saveAndCalc()">计  算</button>
    </div>
    
    <div class="input-group">
        <div class="input-item">
            <label>E:</label>
            <input id="inputE" type="number" step="0.1" value="1.5"><span>米</span>
        </div>
        <div class="input-item">
            <label>D:</label>
            <input id="inputD" type="number" step="0.1" value="2"><span>米</span>
        </div>
        <div class="input-item">
            <label>B:</label>
            <input id="inputB" type="number" step="0.1" value="10"><span>米</span>
        </div>
        <div class="input-item">
            <label>F:</label>
            <input id="inputF" type="number" step="0.1" value="5"><span>米</span>
        </div>
        <div class="input-item">
            <label>H:</label>
            <input id="inputH" type="number" step="0.1" value="10"><span>米</span>
        </div>
    </div>

    <div class="output-group">
        <div class="output-item">
            <label>A</label>
            <span id="outputA">-</span>
        </div>
        <div class="output-item">
            <label>C</label>
            <span id="outputC">-</span>
        </div>
        <div class="output-item">
            <label>∠</label>
            <span id="angle">-</span>
        </div>
    </div>
</div>

<script>
var CANVAS_MAX_WIDTH=350;
var CANVAS_MAX_HEIGHT=225;
var canvas=document.getElementById("myCanvas");
var ctx=canvas.getContext("2d");

var img = new Image();
img.onload = function() { drawCrane(); };
img.onerror = function() { drawSketch(); };
img.src = "crane.jpg";

function loadData() {
    try {
        var dataE = localStorage.getItem("crane_inputE");
        var dataD = localStorage.getItem("crane_inputD");
        var dataB = localStorage.getItem("crane_inputB");
        var dataF = localStorage.getItem("crane_inputF");
        var dataH = localStorage.getItem("crane_inputH");
        
        if(dataE !== null) document.getElementById("inputE").value = dataE;
        if(dataD !== null) document.getElementById("inputD").value = dataD;
        if(dataB !== null) document.getElementById("inputB").value = dataB;
        if(dataF !== null) document.getElementById("inputF").value = dataF;
        if(dataH !== null) document.getElementById("inputH").value = dataH;
    } catch(e) { loadFromCookie(); }
}

function loadFromCookie() {
    var cookieE=getCookie("inputE");
    if(cookieE != "") document.getElementById("inputE").value=cookieE;
    var cookieD=getCookie("inputD");
    if(cookieD != "") document.getElementById("inputD").value=cookieD;
    var cookieB=getCookie("inputB");
    if(cookieB != "") document.getElementById("inputB").value=cookieB;
    var cookieF=getCookie("inputF");
    if(cookieF != "") document.getElementById("inputF").value=cookieF;
    var cookieH=getCookie("inputH");
    if(cookieH != "") document.getElementById("inputH").value=cookieH;
}

function saveData() {
    var inputE = document.getElementById("inputE").value;
    var inputD = document.getElementById("inputD").value;
    var inputB = document.getElementById("inputB").value;
    var inputF = document.getElementById("inputF").value;
    var inputH = document.getElementById("inputH").value;
    
    try {
        localStorage.setItem("crane_inputE", inputE);
        localStorage.setItem("crane_inputD", inputD);
        localStorage.setItem("crane_inputB", inputB);
        localStorage.setItem("crane_inputF", inputF);
        localStorage.setItem("crane_inputH", inputH);
    } catch(e) {
        document.cookie="inputE="+inputE;
        document.cookie="inputD="+inputD;
        document.cookie="inputB="+inputB;
        document.cookie="inputF="+inputF;
        document.cookie="inputH="+inputH;
    }
}

function saveAndCalc() { saveData(); draw(); }

function drawCrane() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, 350, 225);
}

function drawSketch() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#f0f0f0";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(20, canvas.height - 30);
    ctx.lineTo(canvas.width - 20, canvas.height - 30);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(50, canvas.height - 30);
    ctx.lineTo(canvas.width - 80, 40);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(canvas.width - 80, 40);
    ctx.lineTo(canvas.width - 80, canvas.height - 80);
    ctx.stroke();
    ctx.fillStyle = "#666";
    ctx.fillRect(20, canvas.height - 60, 40, 30);
    ctx.fillStyle = "#2196F3";
    ctx.font = "14px Arial";
    ctx.fillText("吊臂示意图", canvas.width/2 - 45, canvas.height/2);
}

function draw() {
var inputE=document.getElementById("inputE");
var inputD=document.getElementById("inputD");
var inputB=document.getElementById("inputB");
var inputF=document.getElementById("inputF");
var inputH=document.getElementById("inputH");

var a1=parseFloat(inputD.value)+parseFloat(inputB.value);
var b1=parseFloat(inputH.value)-parseFloat(inputE.value);
var a2=parseFloat(inputF.value);
var b2=(a2*b1)/a1;

var a=parseFloat(inputD.value)+parseFloat(inputB.value)+parseFloat(inputF.value);
var b=b1+b2;
var c=Math.sqrt(a*a+b*b);
var angle=Math.acos(a/c)*180/Math.PI;

var outputA = document.getElementById("outputA");
var outputC = document.getElementById("outputC");
var outputAngle = document.getElementById("angle");

if(isNaN(c) || isNaN(angle)) {
    outputA.textContent = "错误";
    outputC.textContent = "错误";
    outputAngle.textContent = "错误";
} else {
    outputA.textContent = c.toFixed(1) + "米";
    outputC.textContent = (parseFloat(b)+parseFloat(inputE.value)).toFixed(1) + "米";
    outputAngle.textContent = angle.toFixed(1) + "°";
}
}

function getCookie(cname) {
    var name = cname + "=";
    var decodedCookie = decodeURIComponent(document.cookie);
    var ca = decodedCookie.split(';');
    for(var i = 0; i <ca.length; i++) {
        var c = ca[i];
        while (c.charAt(0) == ' ') { c = c.substring(1); }
        if (c.indexOf(name) == 0) { return c.substring(name.length, c.length); }
    }
    return "";
}

loadData();
</script>
</body>
</html>
